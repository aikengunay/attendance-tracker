[build]
builder = "NIXPACKS"
# Nixpacks already runs npm ci; a second npm ci hits EBUSY on the
# mounted node_modules/.cache. build script already runs prisma generate.
buildCommand = "npx prisma migrate deploy && npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
