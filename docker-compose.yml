# Local Postgres only. App runs via `npm run dev` / Railway (Nixpacks).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: presentpo
      POSTGRES_PASSWORD: presentpo
      POSTGRES_DB: presentpo
    ports:
      - "5432:5432"
    volumes:
      - presentpo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U presentpo -d presentpo"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  presentpo_pg:
